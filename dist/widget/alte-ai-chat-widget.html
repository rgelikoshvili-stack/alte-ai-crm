<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alte University AI Assistant - Safe Pro Sidebar</title>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f6f2e8;
      --color-background-tertiary: #e8f4f2;
      --color-border-secondary: #d8e4e1;
      --color-border-tertiary: #e8e2d4;
      --color-text-primary: #122224;
      --color-text-secondary: #5f7472;
      --color-text-tertiary: #92a3a0;
      --border-radius-lg: 12px;
      --font-sans: Inter, "Noto Sans Georgian", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#eef5f4 0%,#faf7ef 100%);font-family:var(--font-sans);color:var(--color-text-primary);padding:24px}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .shell{display:flex;width:min(780px,calc(100vw - 32px));height:640px;border:0.5px solid var(--color-border-tertiary);border-radius:16px;overflow:hidden;font-family:var(--font-sans);background:var(--color-background-primary);box-shadow:0 24px 70px rgba(7,64,69,.16)}
    .side{width:222px;background:#e8f4f2;border-right:0.5px solid #c8e4e0;display:flex;flex-direction:column;flex-shrink:0}
    .s-brand{padding:17px 15px 13px;border-bottom:0.5px solid #c8e4e0;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.28)}
    .s-logo{width:32px;height:32px;border-radius:50%;background:#074045;color:#fff;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .s-title{font-size:13px;font-weight:500;color:#122224}
    .s-sub{font-size:10px;color:#4a7a74;margin-top:1px}
    .s-nav{flex:1;padding:8px 6px;overflow-y:auto}
    .s-sec{font-size:10px;font-weight:500;color:#5a8a84;letter-spacing:.07em;text-transform:uppercase;padding:10px 8px 4px}
    .s-btn{width:100%;display:flex;align-items:center;gap:8px;padding:8.5px 10px;border-radius:9px;border:none;background:none;color:#2a5a56;font-size:12px;cursor:pointer;text-align:left;transition:.12s;line-height:1.3}
    .s-btn:hover{background:rgba(7,64,69,.1);color:#074045;transform:translateX(1px)}
    .s-btn.on{background:#074045;color:#fff;box-shadow:0 8px 18px rgba(7,64,69,.18)}
    .s-btn.on i{opacity:1}
    .s-btn i{font-size:13px;opacity:.7;flex-shrink:0;width:16px;text-align:center;font-style:normal}
    .s-foot{padding:10px 12px;border-top:0.5px solid #c8e4e0;display:flex;align-items:center;gap:8px}
    .s-av{width:26px;height:26px;border-radius:50%;background:#c0deda;color:#074045;font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .s-u{font-size:12px;font-weight:500;color:#122224}
    .s-r{font-size:10px;color:#4a7a74}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--color-background-primary)}
    .c-hdr{padding:12px 15px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.72)}
    .c-av{width:30px;height:30px;border-radius:50%;background:#074045;color:#fff;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .c-info{flex:1;min-width:0}
    .c-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
    .c-stat{font-size:10px;color:var(--color-text-secondary);display:flex;align-items:center;gap:3px;margin-top:1px}
    .ondot{width:6px;height:6px;border-radius:50%;background:#1ca672;display:inline-block}
    .c-acts{display:flex;gap:5px}
    .l-btn{height:26px;padding:0 9px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);font-size:11px;font-weight:500;cursor:pointer;transition:.1s}
    .l-btn.on{background:#074045;color:#fff;border-color:#074045}
    .l-btn:hover:not(.on){background:var(--color-background-secondary)}
    .ic-btn{width:26px;height:26px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
    .ic-btn:hover{background:var(--color-background-secondary)}
    .trust{padding:6px 15px;background:#f0faf8;border-bottom:0.5px solid #c8e8e2;font-size:11px;color:#2d6b60;display:flex;align-items:center;gap:6px}
    .trust i{font-size:12px;color:#1ca672;font-style:normal}
    .msgs{flex:1;overflow-y:auto;padding:14px 15px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(180deg,#fffdf8 0%,#ffffff 42%)}
    .row{display:flex;gap:7px;align-items:flex-end}
    .row.u{flex-direction:row-reverse}
    .m-av{width:22px;height:22px;border-radius:50%;background:#e8f4f2;color:#074045;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .m-av.u{background:var(--color-background-tertiary);color:var(--color-text-secondary)}
    .m-av.op{background:#fff3e0;color:#e65100}
    .bub{padding:9px 12px;border-radius:12px;font-size:12.5px;line-height:1.55;max-width:82%;white-space:pre-wrap}
    .bot .bub{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-bottom-left-radius:4px;color:var(--color-text-primary);box-shadow:0 3px 10px rgba(26,37,32,.04)}
    .u .bub{background:#074045;color:#fff;border-bottom-right-radius:3px}
    .op .bub{background:#fff8f0;border:0.5px solid #ffd0a0;border-bottom-left-radius:3px;color:#5a2e00}
    .src{margin-top:4px;font-size:10px;display:flex;align-items:center;gap:3px;color:var(--color-text-secondary)}
    .src a{color:#2a7a6e;text-decoration:none;overflow-wrap:anywhere}
    .handover-card{margin-top:7px;padding:10px 12px;background:#fff;border:0.5px solid #ffd0a0;border-left:3px solid #e8714e;border-radius:10px;font-size:12px}
    .hc-head{font-weight:500;font-size:12px;color:#e65100;margin-bottom:5px;display:flex;align-items:center;gap:4px}
    .hc-dept{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;background:#fff3e0;color:#e65100;margin:2px 0}
    .hc-note{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
    .lcard{margin-top:7px;padding:8px 10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-size:12px}
    .lcard-h{font-weight:500;font-size:11px;color:var(--color-text-primary);margin-bottom:4px;display:flex;align-items:center;gap:3px}
    .lcard-r{color:var(--color-text-secondary);padding:1px 0}
    .lbadge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:#e8f4f2;color:#074045;margin-top:3px}
    .tdots{display:flex;gap:3px;padding:8px 11px;align-items:center}
    .td{width:5px;height:5px;border-radius:50%;background:var(--color-text-tertiary);animation:bl 1.2s infinite}
    .td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
    @keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .quick-wrap{padding:0 12px 8px;display:flex;flex-wrap:wrap;gap:6px}
    .quick-btn{border:0.5px solid var(--color-border-tertiary);background:#fff;color:#074045;border-radius:20px;padding:5.5px 9px;font-size:10.5px;cursor:pointer;box-shadow:0 2px 6px rgba(7,64,69,.04)}
    .quick-btn:hover{background:#e8f4f2;border-color:#b9d7d3}
    .composer{display:flex;gap:7px;padding:9px 12px;border-top:0.5px solid var(--color-border-tertiary)}
    .composer input{flex:1;height:34px;border:0.5px solid var(--color-border-secondary);border-radius:7px;padding:0 10px;font-size:12.5px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
    .composer input:focus{border-color:#074045}
    .composer input::placeholder{color:var(--color-text-tertiary)}
    .sbtn{height:34px;padding:0 12px;border:none;border-radius:7px;background:#074045;color:#fff;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .sbtn:hover{background:#0a5258}
    .sbtn:disabled{opacity:.55;cursor:not-allowed}
    .dept-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:20px;background:#e8f4f2;color:#074045;margin-bottom:4px}
    .privacy-note{padding:0 12px 9px;font-size:10px;line-height:1.4;color:var(--color-text-secondary)}
    .privacy-note a{color:#2a7a6e;text-decoration:none}
    .privacy-note a:hover{text-decoration:underline}
    .consent-note{margin-top:6px;font-size:10.5px;line-height:1.45;color:var(--color-text-secondary)}
    .consent-note a{color:#2a7a6e;text-decoration:none}
    .pro-greet{display:grid;gap:8px;min-width:260px}
    .pro-greet .hero{font-size:13px;line-height:1.55;color:var(--color-text-primary)}
    .pro-greet .feat{display:grid;grid-template-columns:28px 1fr;gap:8px;align-items:center;padding:8px 9px;background:#fff;border:0.5px solid var(--color-border-tertiary);border-radius:10px}
    .pro-greet .feat-ic{width:28px;height:28px;border-radius:9px;background:#e8f4f2;color:#074045;display:flex;align-items:center;justify-content:center;font-size:13px}
    .pro-greet .feat-title{font-size:12px;font-weight:700;color:#122224}
    .pro-greet .feat-desc{font-size:10.5px;line-height:1.35;color:var(--color-text-secondary);margin-top:1px}
    .selected-strip{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:5px 8px;border-radius:999px;background:#fff;border:0.5px solid #c8e4e0;color:#2a5a56;font-size:10.5px}
    @media (max-width:720px){body{padding:10px}.shell{width:100%;height:auto;min-height:640px;flex-direction:column}.side{width:100%;max-height:220px;border-right:0;border-bottom:0.5px solid #c8e4e0}.main{min-height:520px}.bub{max-width:90%}}
  </style>
</head>

        featHumanTitle: "ოპერატორთან გადამისამართება",
        featHumanDesc: "დაბალი სანდოობის ან სენსიტიურ თემაზე ჩაერთვება შესაბამისი გუნდი.",
        error: "კავშირი დროებით მიუწვდომელია. სცადეთ მოგვიანებით ან გამოიყენეთ ოფიციალური საკონტაქტო არხი."
      },
      en: {
        s1: "Menu", s2: "Other", user: "Guest", role: "User",
        placeholder: "Ask about programs, admissions, or funding...",
        send: "Send", trust: "Answers sourced from alte.edu.ge official pages",
        online: "Online · Backend connected", connecting: "Connecting to backend...", thinking: "Thinking...",
        greet: "Hello!  I am Alte University's AI Assistant.\n\nChoose a topic from the sidebar or ask me anything.",
        helper: "Sure, I can help with this topic. Please write your question.",
        human: "I want to talk to an operator",
        handover: "Operator connected",
        handoverNote: (dept) => `I can connect you with the right department: ${dept}. You may leave your phone or email so an operator can contact you.`,
        contactTitle: "Contact details",
        contactBody: "If you want an operator to contact you, you may leave your phone or email.",
        privacyNote: "Your contact details submitted in this chat will be used only for consultation and for connecting you with the relevant Alte University department.",
        privacyLink: "Privacy Policy",
        sources: "Sources",
        selectedDept: "Selected department",
        featKbTitle: "Answers from official sources",
        featKbDesc: "If source or approval is missing, the answer stays conservative.",
        featDeptTitle: "Department context",
        featDeptDesc: "The sidebar topic is sent to the backend for correct routing.",
        featHumanTitle: "Operator handover",
        featHumanDesc: "Low-confidence or sensitive topics route to the right team.",
        error: "The connection is temporarily unavailable. Please try later or use an official contact channel."
      }
    };

    const storage = {
      lang: "alteSafeProExactLang",
      sessionId: "alteSafeProExactSessionId",
      conversationId: "alteSafeProExactConversationId",
      dept: "alteSafeProExactDepartment",
      topic: "alteSafeProExactTopic"
    };

    let lang = localStorage.getItem(storage.lang) || cfg.defaultLanguage || "ka";
    let activeDept = localStorage.getItem(storage.dept) || "admissions";
    let activeTopic = localStorage.getItem(storage.topic) || "programs";
    let sessionId = localStorage.getItem(storage.sessionId);
    let conversationId = localStorage.getItem(storage.conversationId);
    let busy = false;

    const navEl = document.getElementById("sb-nav");
    const msgEl = document.getElementById("msgs");
    const quickEl = document.getElementById("quick-row");
    const inputEl = document.getElementById("inp");
    const sendBtn = document.getElementById("send-btn");
    const composer = document.getElementById("composer");
    const kaBtn = document.getElementById("ka-btn");
    const enBtn = document.getElementById("en-btn");
    const resetBtn = document.getElementById("reset-btn");
    const privacyNoteEl = document.getElementById("privacy-note");

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function deptName(key) {
      const normalized = normalizeDept(key);
      return (DEPTS[lang][normalized] || DEPTS[lang].general).name;
    }

    function normalizeDept(value) {
      const raw = String(value || "").toLowerCase();
      if (raw.includes("finance") || raw.includes("tuition") || raw.includes("საფას")) return "finance";
      if (raw.includes("international") || raw.includes("join") || raw.includes("საერთ")) return "international";
      if (raw.includes("medicine") || raw.includes("md") || raw.includes("მედიც")) return "medicine";
      if (raw.includes("student")) return "student_services";
      if (raw.includes("it") || raw.includes("technical")) return "it_support";
      if (raw.includes("admission") || raw.includes("მიღ")) return "admissions";
      return DEPTS[lang][raw] ? raw : activeDept || "admissions";
    }

    function renderNav() {
      navEl.innerHTML = "";
      const makeSection = (items, label) => {
        const sec = document.createElement("div");
        sec.className = "s-sec";
        sec.textContent = label;
        navEl.appendChild(sec);
        items.forEach((item) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = `s-btn${item.dept === activeDept && item.topic === activeTopic ? " on" : ""}`;
          btn.dataset.dept = item.dept;
          btn.dataset.topic = item.topic;
          btn.innerHTML = `<i aria-hidden="true">${item.i}</i>${item.l}`;
          btn.addEventListener("click", () => {
            if (item.dept === "_human") {
              activeTopic = "human_operator";
              localStorage.setItem(storage.topic, activeTopic);
              sendMessage(TXT[lang].human, { humanRequest: true });
              return;
            }
            activeDept = item.dept;
            activeTopic = item.topic;
            localStorage.setItem(storage.dept, activeDept);
            localStorage.setItem(storage.topic, activeTopic);
            renderNav();
            renderQuickChips();
            addBotMsg(`${deptBadge(activeDept)}${esc(TXT[lang].helper)}`);
          });
          navEl.appendChild(btn);
        });
      };
      makeSection(NAV[lang], TXT[lang].s1);
      makeSection(NAV2[lang], TXT[lang].s2);
    }

    function renderQuickChips() {
      quickEl.innerHTML = "";
      const chips = (quickChips[activeDept] || quickChips.general)[lang] || [];
      chips.forEach((chip) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "quick-btn";
        btn.textContent = chip;
        btn.addEventListener("click", () => sendMessage(chip));
        quickEl.appendChild(btn);
      });
    }

    function setLang(next) {
      lang = next;
      localStorage.setItem(storage.lang, lang);
      document.documentElement.lang = lang;
      kaBtn.classList.toggle("on", lang === "ka");
      enBtn.classList.toggle("on", lang === "en");
      inputEl.placeholder = TXT[lang].placeholder;
      document.getElementById("send-lbl").textContent = TXT[lang].send;
      document.getElementById("trust-txt").textContent = TXT[lang].trust;
      document.getElementById("hdr-stat").textContent = TXT[lang].online;
      document.getElementById("sb-user").textContent = TXT[lang].user;
      document.getElementById("sb-role").textContent = TXT[lang].role;
      // Replace #privacy-policy-pending with official Alte Privacy Policy URL before public launch.
      privacyNoteEl.innerHTML = `${esc(TXT[lang].privacyNote)} <a href="#privacy-policy-pending">${esc(TXT[lang].privacyLink)}</a>`;
      renderNav();
      renderQuickChips();
      if (!msgEl.children.length) addBotMsg(greetingHtml());
    }

    function deptBadge(key) {
      const d = DEPTS[lang][normalizeDept(key)] || DEPTS[lang].general;
      return `<div class="dept-badge">${d.icon} ${esc(d.name)}</div>`;
    }

    function greetingHtml() {
      return `
        <div class="pro-greet">
          <div class="hero">${esc(TXT[lang].greet)}</div>
          <div class="selected-strip">${esc(TXT[lang].selectedDept)}: ${esc(deptName(activeDept))}</div>
          <div class="feat">
            <div class="feat-ic">✓</div>
            <div><div class="feat-title">${esc(TXT[lang].featKbTitle)}</div><div class="feat-desc">${esc(TXT[lang].featKbDesc)}</div></div>
          </div>
          <div class="feat">
            <div class="feat-ic">⌁</div>
            <div><div class="feat-title">${esc(TXT[lang].featDeptTitle)}</div><div class="feat-desc">${esc(TXT[lang].featDeptDesc)}</div></div>
          </div>
          <div class="feat">
            <div class="feat-ic">☏</div>
            <div><div class="feat-title">${esc(TXT[lang].featHumanTitle)}</div><div class="feat-desc">${esc(TXT[lang].featHumanDesc)}</div></div>
          </div>
        </div>`;
    }

    function addBotMsg(html, payload) {
      const row = document.createElement("div");
      row.className = "row bot";
      row.innerHTML = `<div class="m-av">A</div><div><div class="bub">${html}</div></div>`;
      if (payload) renderExtras(row.querySelector(".bub"), payload);
      msgEl.appendChild(row);
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    function addUserMsg(text) {
      const row = document.createElement("div");
      row.className = "row u";
      row.innerHTML = `<div class="m-av u">U</div><div class="bub">${esc(text)}</div>`;
      msgEl.appendChild(row);
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    function addOperatorCard(deptKey) {
      const d = DEPTS[lang][normalizeDept(deptKey)] || DEPTS[lang].general;
      const row = document.createElement("div");
      row.className = "row op";
      row.innerHTML = `
        <div class="m-av op">OP</div>
        <div class="bub">
          <div class="handover-card">
            <div class="hc-head">☏ ${TXT[lang].handover}</div>
            <div class="hc-dept">${d.icon} ${esc(d.name)}</div>
            <div class="hc-note">${esc(TXT[lang].handoverNote(d.name))}</div>
          </div>
        </div>`;
      msgEl.appendChild(row);
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    function showTyping() {
      const row = document.createElement("div");
      row.className = "row bot";
      row.id = "typing";
      row.innerHTML = `<div class="m-av">A</div><div class="bub"><div class="tdots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
      msgEl.appendChild(row);
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    function removeTyping() {
      const node = document.getElementById("typing");
      if (node) node.remove();
    }

    function renderExtras(parent, payload) {
      const missing = Array.isArray(payload.missing_fields) ? payload.missing_fields : [];
      const confidence = typeof payload.confidence === "number" ? payload.confidence : null;
      const routeDept = normalizeDept(payload.department_key || payload.route_department || payload.department || activeDept);
      const shouldHandover = Boolean(
        payload.should_handover ||
        payload.needs_handover ||
        payload.force_handover ||
        payload.route_department ||
        payload.department_key ||
        payload.source_missing ||
        (confidence !== null && confidence < 0.70) ||
        missing.includes("phone_or_email") ||
        missing.includes("phone") ||
        missing.includes("email")
      );

      const sources = Array.isArray(payload.used_sources) ? payload.used_sources : Array.isArray(payload.sources) ? payload.sources : [];
      if (sources.length) {
        const box = document.createElement("div");
        box.className = "lcard";
        box.innerHTML = `<div class="lcard-h">↗ ${TXT[lang].sources}</div>`;
        sources.slice(0, 3).forEach((source) => {
          const url = source.source_url || source.url || source.link;
          const title = source.title || source.source_key || url || "Knowledge Base";
          const line = document.createElement(url ? "a" : "div");
          line.className = "lcard-r";
          line.textContent = title;
          if (url) {
            line.href = url;
            line.target = "_blank";
            line.rel = "noreferrer";
          }
          box.appendChild(line);
        });
        parent.appendChild(box);
      }

      if (shouldHandover) addOperatorCard(routeDept);

      if (missing.includes("phone_or_email") || missing.includes("phone") || missing.includes("email")) {
        const card = document.createElement("div");
        card.className = "lcard";
        card.innerHTML = `<div class="lcard-h">${TXT[lang].contactTitle}</div><div class="lcard-r">${TXT[lang].contactBody}</div><div class="consent-note">${esc(TXT[lang].privacyNote)} <a href="#privacy-policy-pending">${esc(TXT[lang].privacyLink)}</a></div>`;
        parent.appendChild(card);
      }
    }

    async function ensureSession() {
      if (sessionId || conversationId) return true;
      setBusy(true, TXT[lang].connecting);
      try {
        const response = await fetch(`${cfg.apiBaseUrl}/chat/session/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source_domain: cfg.sourceDomain || "alte.edu.ge",
            language: lang,
            channel: "website",
            widget_variant: "safe_pro_sidebar"
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        sessionId = data.session_id || data.sessionId || sessionId;
        conversationId = data.conversation_id || data.conversationId || conversationId;
        if (sessionId) localStorage.setItem(storage.sessionId, sessionId);
        if (conversationId) localStorage.setItem(storage.conversationId, conversationId);
        setBusy(false, TXT[lang].online);
        return true;
      } catch (_) {
        setBusy(false, "Backend unavailable");
        addBotMsg(esc(TXT[lang].error));
        return false;
      }
    }

    async function sendMessage(text, options = {}) {
      const value = String(text || "").trim();
      if (!value || busy) return;
      addUserMsg(value);
      const connected = await ensureSession();
      if (!connected) return;
      showTyping();
      setBusy(true, TXT[lang].thinking);
      try {
        const metadata = {
          selected_department: activeDept,
          selected_topic: activeTopic,
          page_url: window.location.href,
          widget_variant: "safe_pro_sidebar",
          human_request: Boolean(options.humanRequest)
        };
        const response = await fetch(`${cfg.apiBaseUrl}/chat/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: sessionId,
            conversation_id: conversationId,
            message: value,
            language: lang,
            source_domain: cfg.sourceDomain || "alte.edu.ge",
            selected_department: activeDept,
            selected_topic: activeTopic,
            widget_variant: "safe_pro_sidebar",
            human_request: Boolean(options.humanRequest),
            metadata,
            metadata_json: metadata
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        removeTyping();
        const reply = data.reply || data.answer || data.message || TXT[lang].error;
        addBotMsg(`${deptBadge(data.department_key || data.route_department || activeDept)}${esc(reply)}`, data);
      } catch (_) {
        removeTyping();
        addBotMsg(esc(TXT[lang].error));
      } finally {
        setBusy(false, TXT[lang].online);
      }
    }

    function clearChat() {
      localStorage.removeItem(storage.sessionId);
      localStorage.removeItem(storage.conversationId);
      sessionId = null;
      conversationId = null;
      msgEl.innerHTML = "";
      addBotMsg(greetingHtml());
      ensureSession();
    }

    function setBusy(value, label) {
      busy = value;
      sendBtn.disabled = value;
      document.getElementById("hdr-stat").textContent = label;
    }

    composer.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = inputEl.value;
      inputEl.value = "";
      sendMessage(value);
    });
    kaBtn.addEventListener("click", () => setLang("ka"));
    enBtn.addEventListener("click", () => setLang("en"));
    resetBtn.addEventListener("click", clearChat);

    setLang(lang);
    ensureSession();
  </script>
</body>
</html>
