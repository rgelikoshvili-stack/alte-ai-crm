<!DOCTYPE html>
<html>
<head>
  <title>Bridge Hub Settings</title>
  <style>
    body { font-family: Arial; margin: 24px; background: #f7f9fc; }
    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

<h1>Bridge Hub — Settings</h1>

<div class="card">
  <strong>Autopilot Threshold</strong><br>
  <input type="range" min="0" max="1" step="0.01" value="0.8" />
</div>

<div class="card">
  <strong>Mode</strong><br>
  <select>
    <option>Observer</option>
    <option>Assist</option>
    <option>Autonomous (future)</option>
  </select>
</div>

<div class="card">
  <strong>System Status</strong><br>
  Stable
</div>

</body>
</html>
