<div id="app"></div>

<script src="19e22cd3-cead-4197-92c3-f1003d7eff99" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="5c51933a-64ad-496c-8d1d-9726e7044a61" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="37f002c2-f143-49da-9a69-032a5649fa4d" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ef4bd550-b63c-4634-9d09-b694dfb20b21"></script>

<script type="text/babel" src="c39bfd63-495f-4c94-b9d8-d5fb60002991"></script>
<script type="text/babel" src="7109bb36-e243-4e94-a9f9-74a828666dd0"></script>
<script type="text/babel" src="4c060577-ec02-4767-983a-2aad54905cc6"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor, TweakToggle, TweakSelect, TweakButton } = window;
const { Page, ChatWidget } = window;
const { STRINGS } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "teal",
  "density": "cozy",
  "surface": "cream",
  "lang": "KA",
  "showSidebar": true,
  "openOnLoad": true
}/*EDITMODE-END*/;

const ACCENTS = {
  teal:    { name:"ალტე Teal",   primary:"#074045", deep:"#052e32", mid:"#0a5258", soft:"#eef7f5", line:"#d4e8e3", accent:"#e8714e" },
  forest:  { name:"Forest",      primary:"#1f4d3a", deep:"#143527", mid:"#2a6a4f", soft:"#eaf4ec", line:"#cfe5d3", accent:"#e8714e" },
  ink:     { name:"Ink",         primary:"#1a1f2b", deep:"#0c0f17", mid:"#2a3346", soft:"#eef0f4", line:"#d4d8e0", accent:"#e8714e" },
};
const SURFACES = {
  cream:  { page:"#f4f1ea", paper:"#faf8f1", panel:"#ffffff", chip:"#f6f2e8", line:"#e8e2d4", ink:"#0f1a1c", mute:"#5a6c6d" },
  paper:  { page:"#ffffff", paper:"#fafaf9", panel:"#ffffff", chip:"#f4f4f1", line:"#e7e7e3", ink:"#0f1a1c", mute:"#5a6c6d" },
};

function applyTokens(t){
  const a = ACCENTS[t.accent] || ACCENTS.teal;
  const s = SURFACES[t.surface] || SURFACES.cream;
  const r = document.documentElement.style;
  r.setProperty('--alte-teal', a.primary);
  r.setProperty('--alte-teal-deep', a.deep);
  r.setProperty('--alte-teal-mid', a.mid);
  r.setProperty('--alte-orange', a.accent);
  r.setProperty('--alte-soft', a.soft);
  r.setProperty('--alte-soft-line', a.line);
  r.setProperty('--alte-page', s.page);
  r.setProperty('--alte-paper', s.paper);
  r.setProperty('--alte-panel', s.panel);
  r.setProperty('--alte-chip', s.chip);
  r.setProperty('--alte-line', s.line);
  r.setProperty('--alte-ink', s.ink);
  r.setProperty('--alte-mute', s.mute);
  // density
  const d = t.density==='compact' ? { gap:8, bub:'8px 12px', font:12.5, bubR:11 } : { gap:11, bub:'10px 13px', font:13, bubR:13 };
  r.setProperty('--gap', d.gap+'px');
  r.setProperty('--bub', d.bub);
  r.setProperty('--msg-font', d.font+'px');
  r.setProperty('--bub-r', d.bubR+'px');
}

function App(){
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(()=>{ applyTokens(tweaks); },[tweaks]);
  const lang = tweaks.lang || 'KA';
  const S = STRINGS[lang];

  return (
    <>
      <Page tweaks={tweaks} S={S} setTweak={setTweak}/>
      <TweaksPanel title="Tweaks" defaultOpen={false}>
        <TweakSection title="ბრენდი">
          <TweakSelect
            label="Accent"
            value={tweaks.accent}
            onChange={(v)=>setTweak('accent', v)}
            options={Object.keys(ACCENTS).map(k=>({value:k,label:ACCENTS[k].name}))}
          />
          <TweakRadio
            label="Surface"
            value={tweaks.surface}
            onChange={(v)=>setTweak('surface', v)}
            options={[{value:'cream',label:'Cream'},{value:'paper',label:'Paper'}]}
          />
        </TweakSection>
        <TweakSection title="გამოცდილება">
          <TweakRadio
            label="ენა"
            value={tweaks.lang}
            onChange={(v)=>setTweak('lang', v)}
            options={[{value:'KA',label:'KA'},{value:'EN',label:'EN'}]}
          />
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={(v)=>setTweak('density', v)}
            options={[{value:'cozy',label:'Cozy'},{value:'compact',label:'Compact'}]}
          />
          <TweakToggle
            label="Sidebar"
            value={tweaks.showSidebar}
            onChange={(v)=>setTweak('showSidebar', v)}
          />
          <TweakToggle
            label="გახსნილი"
            value={tweaks.openOnLoad}
            onChange={(v)=>setTweak('openOnLoad', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>


</body></html>
