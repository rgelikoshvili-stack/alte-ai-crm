<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alte AI Chat - Pro v2 Safe</title>
  <style>
    :root {
      --alte-teal: #074045;
      --alte-teal-deep: #052e32;
      --alte-teal-mid: #0a5258;
      --alte-orange: #e8714e;
      --alte-page: #f4f1ea;
      --alte-paper: #faf8f1;
      --alte-chip: #f6f2e8;
      --alte-line: #e8e2d4;
      --alte-ink: #0f1a1c;
      --alte-muted: #5a6c6d;
      --alte-soft: #eef7f5;
      --font-sans: Inter, "Noto Sans Georgian", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color-scheme: light;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 18% 12%, rgba(232, 113, 78, .12), transparent 30%),
        linear-gradient(145deg, #f8f5ed 0%, #eef5f4 100%);
      color: var(--alte-ink);
      font-family: var(--font-sans);
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .pro-widget {
      width: min(860px, calc(100vw - 24px));
      height: min(690px, calc(100vh - 24px));
      min-height: 610px;
      display: grid;
      grid-template-columns: 196px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(232, 226, 212, .95);
      border-radius: 20px;
      background: rgba(250, 248, 241, .98);
      box-shadow: 0 28px 90px rgba(7, 64, 69, .22);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: linear-gradient(180deg, #fbf8ef 0%, #eef7f5 100%);
      border-right: 1px solid var(--alte-line);
    }

    .brand {
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      padding: 16px 14px 13px;
      border-bottom: 1px solid rgba(232, 226, 212, .78);
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--alte-teal);
      color: #fff;
      font-weight: 800;
      letter-spacing: .02em;
      box-shadow: 0 9px 18px rgba(7, 64, 69, .2);
    }

    .brand-title { font-size: 13px; font-weight: 800; line-height: 1.2; }
    .brand-sub { margin-top: 2px; color: var(--alte-muted); font-size: 11px; line-height: 1.3; }

    .nav {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 8px;
    }

    .nav-label {
      padding: 12px 8px 6px;
      color: #678182;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .nav-btn {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      padding: 8px 10px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #345b5d;
      text-align: left;
      transition: background .16s ease, color .16s ease, transform .16s ease;
    }

    .nav-btn:hover { background: rgba(7, 64, 69, .08); transform: translateX(1px); }
    .nav-btn.active {
      background: var(--alte-teal);
      color: #fff;
      box-shadow: 0 10px 22px rgba(7, 64, 69, .22);
    }

    .nav-icon {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: rgba(7, 64, 69, .08);
      color: inherit;
      font-size: 11px;
      font-weight: 800;
    }
    .nav-btn.active .nav-icon { background: rgba(255, 255, 255, .16); }
    .nav-text { min-width: 0; font-size: 12px; font-weight: 750; line-height: 1.25; }
    .nav-topic { display: block; margin-top: 1px; font-size: 10px; font-weight: 600; opacity: .68; }

    .sidebar-footer {
      display: grid;
      grid-template-columns: 30px 1fr;
      gap: 9px;
      align-items: center;
      padding: 12px 14px;
      border-top: 1px solid rgba(232, 226, 212, .82);
      color: var(--alte-muted);
      font-size: 11px;
    }
    .footer-avatar {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #dcefeb;
      color: var(--alte-teal);
      font-size: 12px;
      font-weight: 800;
    }
    .footer-name { color: var(--alte-ink); font-size: 12px; font-weight: 800; }

    .chat {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      background: #fffdf8;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--alte-line);
      background: rgba(255, 253, 248, .94);
      backdrop-filter: blur(8px);
    }
    .assistant-avatar {
      position: relative;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 14px;
      background: var(--alte-teal);
      color: #fff;
      font-weight: 850;
    }
    .assistant-avatar::after {
      content: "";
      position: absolute;
      right: -1px;
      bottom: -1px;
      width: 10px;
      height: 10px;
      border: 2px solid #fffdf8;
      border-radius: 50%;
      background: #18a86f;
    }
    .top-title { flex: 1; min-width: 0; }
    .top-title strong { display: block; font-size: 14px; line-height: 1.2; }
    .top-title span { display: block; margin-top: 2px; color: var(--alte-muted); font-size: 11px; line-height: 1.3; }
    .top-actions { display: flex; align-items: center; gap: 6px; }
    .lang-btn, .icon-btn {
      height: 30px;
      border: 1px solid var(--alte-line);
      border-radius: 10px;
      background: #fff;
      color: var(--alte-muted);
      font-size: 11px;
      font-weight: 800;
    }
    .lang-btn { min-width: 36px; padding: 0 10px; }
    .lang-btn.active { border-color: var(--alte-teal); background: var(--alte-teal); color: #fff; }
    .icon-btn { min-width: 34px; padding: 0 9px; }
    .icon-btn:hover, .lang-btn:hover { border-color: #bfd6d2; background: #f7fbfa; color: var(--alte-teal); }
    .lang-btn.active:hover { background: var(--alte-teal-mid); color: #fff; }

    .status-strip {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #d9ebe7;
      background: #effaf8;
      color: #286d63;
      font-size: 11px;
      font-weight: 700;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #18a86f;
      box-shadow: 0 0 0 4px rgba(24, 168, 111, .13);
    }

    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background:
        linear-gradient(180deg, rgba(244, 241, 234, .72), rgba(255, 253, 248, .94) 38%),
        #fffdf8;
    }

    .message-row { display: flex; gap: 8px; align-items: flex-end; }
    .message-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #dcefeb;
      color: var(--alte-teal);
      font-size: 10px;
      font-weight: 850;
    }
    .message-row.user .msg-avatar { background: #e5ebe9; color: #627274; }
    .bubble {
      max-width: min(82%, 520px);
      padding: 11px 13px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .message-row.bot .bubble {
      border: 1px solid var(--alte-line);
      border-bottom-left-radius: 5px;
      background: var(--alte-paper);
      color: var(--alte-ink);
      box-shadow: 0 4px 16px rgba(15, 26, 28, .04);
    }
    .message-row.user .bubble {
      border-bottom-right-radius: 5px;
      background: var(--alte-teal);
      color: #fff;
    }
    .message-row.operator .bubble {
      border: 1px solid #f5c39e;
      border-left: 4px solid var(--alte-orange);
      background: #fff7ef;
      color: #57320d;
    }

    .dept-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #e7f4f1;
      color: var(--alte-teal);
      font-size: 11px;
      font-weight: 850;
    }

    .welcome {
      display: grid;
      gap: 10px;
      min-width: min(100%, 320px);
    }
    .welcome-title { font-size: 15px; font-weight: 850; }
    .welcome-copy { color: #3b4e50; font-size: 13px; line-height: 1.55; }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 2px;
    }
    .feature-card {
      border: 1px solid var(--alte-line);
      border-radius: 14px;
      background: #fff;
      padding: 10px;
    }
    .feature-card strong { display: block; font-size: 12px; }
    .feature-card span { display: block; margin-top: 3px; color: var(--alte-muted); font-size: 11px; line-height: 1.35; }

    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 8px 11px;
    }
    .typing i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8fa3a2;
      animation: blink 1.2s infinite;
    }
    .typing i:nth-child(2) { animation-delay: .16s; }
    .typing i:nth-child(3) { animation-delay: .32s; }
    @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }

    .source-list, .handover-card, .contact-card {
      display: grid;
      gap: 6px;
      margin-top: 9px;
    }
    .source-card, .contact-card, .handover-card {
      border: 1px solid var(--alte-line);
      border-radius: 13px;
      background: #fff;
      padding: 9px 10px;
      font-size: 11px;
      line-height: 1.45;
    }
    .source-card a { color: var(--alte-teal-mid); text-decoration: none; overflow-wrap: anywhere; }
    .source-card a:hover { text-decoration: underline; }
    .handover-card {
      border-color: #f5c39e;
      border-left: 4px solid var(--alte-orange);
      background: #fff8f1;
      color: #57320d;
    }
    .contact-card {
      border-color: #cfe4e0;
      background: #f8fcfb;
      color: #345b5d;
    }
    .card-title { display: block; margin-bottom: 3px; font-weight: 850; }

    .quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 0 16px 10px;
      background: #fffdf8;
    }
    .quick-chip {
      max-width: 100%;
      border: 1px solid var(--alte-line);
      border-radius: 999px;
      background: #fff;
      color: var(--alte-teal);
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 750;
      box-shadow: 0 3px 10px rgba(7, 64, 69, .04);
      white-space: normal;
    }
    .quick-chip:hover { border-color: #b9d7d3; background: var(--alte-soft); }

    .composer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 11px 16px 8px;
      border-top: 1px solid var(--alte-line);
      background: #fffdf8;
    }
    .composer input {
      height: 40px;
      min-width: 0;
      border: 1px solid #d9e4e1;
      border-radius: 13px;
      background: #fff;
      color: var(--alte-ink);
      padding: 0 13px;
      outline: none;
      font-size: 13px;
    }
    .composer input:focus { border-color: var(--alte-teal); box-shadow: 0 0 0 3px rgba(7, 64, 69, .09); }
    .send-btn {
      height: 40px;
      border: 0;
      border-radius: 13px;
      background: var(--alte-teal);
      color: #fff;
      padding: 0 15px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .send-btn:hover { background: var(--alte-teal-mid); }
    .send-btn:disabled { opacity: .56; cursor: not-allowed; }

    .privacy {
      padding: 0 16px 12px;
      background: #fffdf8;
      color: var(--alte-muted);
      font-size: 10.5px;
      line-height: 1.45;
    }
    .privacy a { color: var(--alte-teal-mid); text-decoration: none; }
    .privacy a:hover { text-decoration: underline; }

    @media (max-width: 760px) {
      body { padding: 10px; }
      .pro-widget {
        width: calc(100vw - 20px);
        height: calc(100vh - 20px);
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        border-radius: 18px;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--alte-line);
      }
      .brand { display: none; }
      .nav {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 8px;
      }
      .nav-label, .sidebar-footer, .nav-topic { display: none; }
      .nav-btn {
        width: auto;
        min-width: 94px;
        grid-template-columns: 20px auto;
        margin: 0;
        padding: 8px;
      }
      .nav-text { font-size: 11px; white-space: nowrap; }
      .topbar { padding: 11px 12px; }
      .top-actions { gap: 4px; }
      .lang-btn, .icon-btn { height: 28px; min-width: 30px; padding: 0 7px; }
      .messages { padding: 12px; }
      .bubble { max-width: 90%; }
      .feature-grid { grid-template-columns: 1fr; }
      .quick-row { padding: 0 12px 8px; }
      .composer { padding: 9px 12px 7px; }
      .send-btn span { display: none; }
    }
  </style>
</head>
<body>
  <h1 class="sr-only">Alte University AI Assistant</h1>
  <section class="pro-widget" aria-label="Alte AI Chat">
    <aside class="sidebar" aria-label="Departments">
      <div class="brand">
        <div class="mark">A</div>
        <div>
          <div class="brand-title">Alte University</div>
          <div class="brand-sub" id="brand-sub">AI Assistant</div>
        </div>
      </div>
      <nav class="nav" id="department-nav"></nav>
      <div class="sidebar-footer">
        <div class="footer-avatar">U</div>
        <div>
          <div class="footer-name" id="footer-name">Guest</div>
          <div id="footer-role">Website visitor</div>
        </div>
      </div>
    </aside>

    <main class="chat">
      <header class="topbar">
        <div class="assistant-avatar">A</div>
        <div class="top-title">
          <strong id="assistant-title">Alte AI Assistant</strong>
          <span id="assistant-status">Backend connected</span>
        </div>
        <div class="top-actions">
          <button class="lang-btn" id="lang-ka" type="button">KA</button>
          <button class="lang-btn" id="lang-en" type="button">EN</button>
          <button class="icon-btn" id="reset-chat" type="button" title="New conversation">New</button>
        </div>
      </header>

      <div class="status-strip">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="status-text">Answers use Alte backend and official knowledge where available.</span>
      </div>

      <div class="messages" id="messages" aria-live="polite"></div>
      <div class="quick-row" id="quick-row"></div>

      <form class="composer" id="composer">
        <input id="message-input" type="text" autocomplete="off" aria-label="Message">
        <button class="send-btn" id="send-button" type="submit"><span id="send-label">Send</span></button>
      </form>
      <div class="privacy" id="privacy-note"></div>
    </main>
  </section>

  <script>
    window.AlteChatWidgetConfig = window.AlteChatWidgetConfig || {
      apiBaseUrl: "https://alte-ai-crm-backend-226875230147.europe-west1.run.app",
      sourceDomain: "alte.edu.ge",
      defaultLanguage: "ka",
      widgetVariant: "pro_v2_safe"
    };

    const cfg = window.AlteChatWidgetConfig;
    const widgetVariant = cfg.widgetVariant || "pro_v2_safe";
    let lang = (cfg.defaultLanguage === "en" ? "en" : "ka");
    let activeDept = cfg.defaultDepartment || (cfg.sourceDomain === "join.alte.edu.ge" ? "international" : "admissions");
    let activeTopic = cfg.defaultTopic || "programs";
    let conversationId = localStorage.getItem("alte_pro_v2_conversation_id") || "";
    let sessionId = localStorage.getItem("alte_pro_v2_session_id") || "";
    let busy = false;

    const TXT = {
      ka: {
        brand: "AI ასისტენტი",
        guest: "სტუმარი",
        visitor: "ვებგვერდის ვიზიტორი",
        status: "პასუხები მოდის Alte backend-იდან და ოფიციალური ცოდნის ბაზიდან, როცა წყარო ხელმისაწვდომია.",
        subtitle: "ონლაინ · უსაფრთხო backend კავშირი",
        placeholder: "მოგვწერეთ კითხვა ალტე უნივერსიტეტზე...",
        send: "გაგზავნა",
        connecting: "სესიის დაწყება...",
        error: "სესიის დაწყება ვერ მოხერხდა. გთხოვთ სცადოთ მოგვიანებით.",
        replyError: "კავშირი დროებით შეფერხებულია. გთხოვთ სცადოთ მოგვიანებით.",
        welcomeTitle: "გამარჯობა, როგორ დაგეხმაროთ?",
        welcomeCopy: "აირჩიეთ დეპარტამენტი ან დასვით კითხვა. სენსიტიურ თემებზე ასისტენტი გიპასუხებთ კონსერვატიულად და საჭიროებისას გადაგამისამართებთ ოპერატორთან.",
        featSources: "წყაროები",
        featSourcesDesc: "პასუხში გამოჩნდება წყაროები, როცა backend აბრუნებს მტკიცებულებებს.",
        featHandover: "ოპერატორი",
        featHandoverDesc: "დაბალი ნდობის ან სენსიტიური კითხვა გადადის შესაბამის დეპარტამენტთან.",
        sources: "წყაროები",
        handoverTitle: "საჭიროა ოპერატორის ჩართვა",
        handoverNote: "ამ საკითხს გადავცემთ შესაბამის დეპარტამენტს. სატესტო რეჟიმში არ შეიყვანოთ ტელეფონი ან ელფოსტა.",
        contactTitle: "საკონტაქტო ინფორმაცია საჭირო იქნება",
        contactNote: "საჯარო smoke ტესტებში არ გაგზავნოთ ტელეფონი ან ელფოსტა.",
        privacy: "ჩატი მუშაობს Alte backend-ით. კონფიდენციალურობის ოფიციალური ბმული ჯერ დამტკიცების პროცესშია: ",
        privacyLink: "privacy pending"
      },
      en: {
        brand: "AI Assistant",
        guest: "Guest",
        visitor: "Website visitor",
        status: "Answers use the Alte backend and official knowledge where available.",
        subtitle: "Online · secure backend connection",
        placeholder: "Ask about Alte University...",
        send: "Send",
        connecting: "Starting session...",
        error: "Could not start the chat session. Please try again later.",
        replyError: "The connection is temporarily unavailable. Please try again later.",
        welcomeTitle: "Hi, how can I help?",
        welcomeCopy: "Choose a department or ask a question. For sensitive topics, the assistant stays conservative and routes to a human operator when needed.",
        featSources: "Sources",
        featSourcesDesc: "Source cards appear when the backend returns evidence.",
        featHandover: "Operator",
        featHandoverDesc: "Low-confidence or sensitive questions route to the right department.",
        sources: "Sources",
        handoverTitle: "Human handover recommended",
        handoverNote: "We can route this to the relevant department. Do not enter phone or email during test smoke.",
        contactTitle: "Contact details may be needed",
        contactNote: "Do not send phone or email in public smoke tests.",
        privacy: "This chat uses the Alte backend. Official privacy link is still pending approval: ",
        privacyLink: "privacy pending"
      }
    };

    const DEPTS = {
      admissions: { code: "AD", ka: "მიღება", en: "Admissions", topic: "admissions" },
      international: { code: "IN", ka: "საერთაშორისო", en: "International", topic: "international" },
      finance: { code: "FI", ka: "ფინანსები", en: "Finance", topic: "tuition" },
      medicine: { code: "MD", ka: "მედიცინა / MD", en: "Medicine / MD", topic: "medicine" },
      student_services: { code: "SS", ka: "სტუდ. სერვისები", en: "Student Services", topic: "student_services" },
      it_support: { code: "IT", ka: "IT დახმარება", en: "IT Support", topic: "it_support" },
      general: { code: "OP", ka: "ოპერატორი", en: "Operator", topic: "human_operator" }
    };

    const NAV = ["admissions", "international", "finance", "medicine", "student_services", "it_support", "general"];
    const QUICK = {
      ka: {
        admissions: ["რა პროგრამები აქვს ალტეს?", "როგორ ჩავაბარო?", "რა საბუთებია საჭირო?", "როდის არის ბოლო ვადა?"],
        international: ["International admission", "What documents are needed?", "Visa and relocation", "English programs"],
        finance: ["რა ღირს სწავლა?", "სტიპენდია", "გრანტი", "გადახდა"],
        medicine: ["MD პროგრამა", "Medicine admission", "Clinical training", "მოთხოვნები"],
        student_services: ["ბიბლიოთეკა", "კარიერა", "სტუდენტის სერვისები"],
        it_support: ["პორტალში ვერ შევდივარ", "პაროლის აღდგენა", "ტექნიკური დახმარება"],
        general: ["მინდა ოპერატორთან საუბარი", "საკონტაქტო ინფორმაცია"]
      },
      en: {
        admissions: ["How do I apply?", "What programs are available?", "Required documents", "Admission deadline"],
        international: ["What documents do international students need?", "I want to apply from India", "Visa and relocation", "English programs"],
        finance: ["How much is tuition?", "Scholarship", "Grant", "Payment"],
        medicine: ["I want to apply for medicine", "MD program", "Clinical training", "Admission requirements"],
        student_services: ["Library", "Career", "Student services"],
        it_support: ["I cannot access the portal", "Password reset", "Technical support"],
        general: ["I want to talk to an operator", "Contact information"]
      }
    };

    const els = {
      nav: document.getElementById("department-nav"),
      messages: document.getElementById("messages"),
      quick: document.getElementById("quick-row"),
      input: document.getElementById("message-input"),
      composer: document.getElementById("composer"),
      send: document.getElementById("send-button"),
      sendLabel: document.getElementById("send-label"),
      ka: document.getElementById("lang-ka"),
      en: document.getElementById("lang-en"),
      reset: document.getElementById("reset-chat"),
      brandSub: document.getElementById("brand-sub"),
      footerName: document.getElementById("footer-name"),
      footerRole: document.getElementById("footer-role"),
      assistantStatus: document.getElementById("assistant-status"),
      statusText: document.getElementById("status-text"),
      privacy: document.getElementById("privacy-note")
    };

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function deptLabel(key) {
      const dept = DEPTS[key] || DEPTS.general;
      return lang === "en" ? dept.en : dept.ka;
    }

    function normalizeDept(value) {
      const raw = String(value || "").toLowerCase();
      if (raw.includes("finance") || raw.includes("tuition") || raw.includes("ფინანს") || raw.includes("საფას")) return "finance";
      if (raw.includes("medicine") || raw.includes("md") || raw.includes("მედ")) return "medicine";
      if (raw.includes("international") || raw.includes("visa") || raw.includes("საერთ")) return "international";
      if (raw.includes("it") || raw.includes("portal") || raw.includes("პორტ")) return "it_support";
      if (raw.includes("student")) return "student_services";
      if (raw.includes("operator") || raw.includes("handover") || raw.includes("human") || raw.includes("ოპერატ")) return "general";
      return value && DEPTS[value] ? value : activeDept || "admissions";
    }

    function renderNav() {
      els.nav.innerHTML = "";
      const label = document.createElement("div");
      label.className = "nav-label";
      label.textContent = lang === "en" ? "Departments" : "დეპარტამენტები";
      els.nav.appendChild(label);
      NAV.forEach((key) => {
        const dept = DEPTS[key];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "nav-btn" + (key === activeDept ? " active" : "");
        btn.innerHTML = `<span class="nav-icon">${dept.code}</span><span class="nav-text">${esc(deptLabel(key))}<span class="nav-topic">${esc(dept.topic)}</span></span>`;
        btn.addEventListener("click", () => {
          activeDept = key;
          activeTopic = dept.topic;
          renderNav();
          renderQuick();
        });
        els.nav.appendChild(btn);
      });
    }

    function renderQuick() {
      els.quick.innerHTML = "";
      (QUICK[lang][activeDept] || QUICK[lang].general).forEach((text) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "quick-chip";
        chip.textContent = text;
        chip.addEventListener("click", () => sendMessage(text));
        els.quick.appendChild(chip);
      });
    }

    function renderStaticText() {
      const t = TXT[lang];
      document.documentElement.lang = lang;
      els.brandSub.textContent = t.brand;
      els.footerName.textContent = t.guest;
      els.footerRole.textContent = t.visitor;
      els.assistantStatus.textContent = t.subtitle;
      els.statusText.textContent = t.status;
      els.input.placeholder = t.placeholder;
      els.sendLabel.textContent = t.send;
      els.ka.classList.toggle("active", lang === "ka");
      els.en.classList.toggle("active", lang === "en");
      els.privacy.innerHTML = `${esc(t.privacy)}<a href="#privacy-policy-pending">${esc(t.privacyLink)}</a>`;
    }

    function welcomeHtml() {
      const t = TXT[lang];
      return `
        <div class="welcome">
          <div class="dept-pill">${esc(deptLabel(activeDept))}</div>
          <div class="welcome-title">${esc(t.welcomeTitle)}</div>
          <div class="welcome-copy">${esc(t.welcomeCopy)}</div>
          <div class="feature-grid">
            <div class="feature-card"><strong>${esc(t.featSources)}</strong><span>${esc(t.featSourcesDesc)}</span></div>
            <div class="feature-card"><strong>${esc(t.featHandover)}</strong><span>${esc(t.featHandoverDesc)}</span></div>
          </div>
        </div>
      `;
    }

    function scrollBottom() {
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    function addMessage(kind, html, payload) {
      const row = document.createElement("div");
      row.className = `message-row ${kind}`;
      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = kind === "user" ? "U" : "A";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = html;
      row.appendChild(avatar);
      row.appendChild(bubble);
      els.messages.appendChild(row);
      if (payload) renderExtras(bubble, payload);
      scrollBottom();
      return row;
    }

    function addUser(text) {
      addMessage("user", esc(text));
    }

    function addBot(html, payload) {
      addMessage("bot", html, payload);
    }

    function addOperator(deptKey) {
      const t = TXT[lang];
      addMessage("operator", `<strong>${esc(t.handoverTitle)}</strong><br>${esc(t.handoverNote)}<div class="dept-pill">${esc(deptLabel(normalizeDept(deptKey)))}</div>`);
    }

    function renderExtras(parent, payload) {
      const sources = Array.isArray(payload.used_sources) ? payload.used_sources.filter(Boolean) : [];
      if (sources.length) {
        const wrap = document.createElement("div");
        wrap.className = "source-list";
        const title = document.createElement("span");
        title.className = "card-title";
        title.textContent = TXT[lang].sources;
        wrap.appendChild(title);
        sources.slice(0, 3).forEach((source) => {
          const card = document.createElement("div");
          card.className = "source-card";
          const safe = esc(source);
          if (/^https?:\/\//i.test(source)) {
            card.innerHTML = `<a href="${safe}" target="_blank" rel="noopener noreferrer">${safe}</a>`;
          } else {
            card.textContent = source;
          }
          wrap.appendChild(card);
        });
        parent.appendChild(wrap);
      }

      const missing = Array.isArray(payload.missing_fields) ? payload.missing_fields : [];
      if (missing.includes("phone") || missing.includes("email")) {
        const card = document.createElement("div");
        card.className = "contact-card";
        card.innerHTML = `<span class="card-title">${esc(TXT[lang].contactTitle)}</span>${esc(TXT[lang].contactNote)}`;
        parent.appendChild(card);
      }
    }

    function showTyping() {
      const row = addMessage("bot", `<span class="typing"><i></i><i></i><i></i></span>`);
      row.id = "typing-row";
    }

    function removeTyping() {
      const row = document.getElementById("typing-row");
      if (row) row.remove();
    }

    function setBusy(next, label) {
      busy = next;
      els.send.disabled = next;
      if (label) els.sendLabel.textContent = label;
      if (!next) els.sendLabel.textContent = TXT[lang].send;
    }

    async function ensureSession() {
      if (conversationId && sessionId) return true;
      setBusy(true, TXT[lang].connecting);
      try {
        const response = await fetch(`${cfg.apiBaseUrl}/chat/session/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source_domain: cfg.sourceDomain || "alte.edu.ge",
            language: lang,
            channel: "website_chat"
          })
        });
        if (!response.ok) {
          console.warn("Alte chat session start failed", { status: response.status });
          throw new Error("session_start_failed");
        }
        const data = await response.json();
        conversationId = data.conversation_id || "";
        sessionId = data.session_id || "";
        if (conversationId) localStorage.setItem("alte_pro_v2_conversation_id", conversationId);
        if (sessionId) localStorage.setItem("alte_pro_v2_session_id", sessionId);
        return Boolean(conversationId);
      } catch (error) {
        console.warn("Alte chat session unavailable", { type: error && error.name ? error.name : "unknown" });
        addBot(esc(TXT[lang].error));
        return false;
      } finally {
        setBusy(false);
      }
    }

    async function sendMessage(text) {
      const value = String(text || "").trim();
      if (!value || busy) return;
      if (!(await ensureSession())) return;
      addUser(value);
      els.input.value = "";
      showTyping();
      setBusy(true);
      try {
        const response = await fetch(`${cfg.apiBaseUrl}/chat/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: conversationId,
            session_id: sessionId,
            message: value,
            source_domain: cfg.sourceDomain || "alte.edu.ge",
            language: lang,
            selected_department: activeDept,
            selected_topic: activeTopic,
            page_url: window.location.href,
            widget_variant: widgetVariant
          })
        });
        if (!response.ok) {
          console.warn("Alte chat message failed", { status: response.status });
          throw new Error("message_failed");
        }
        const data = await response.json();
        removeTyping();
        const routedDept = normalizeDept(data.department_key || data.route_department || activeDept);
        if (routedDept) activeDept = routedDept;
        renderNav();
        renderQuick();
        addBot(`${deptPillHtml(activeDept)}${esc(data.reply || TXT[lang].replyError)}`, data);
        if (data.should_handover) addOperator(data.department_key || data.route_department || activeDept);
      } catch (error) {
        removeTyping();
        console.warn("Alte chat response unavailable", { type: error && error.name ? error.name : "unknown" });
        addBot(esc(TXT[lang].replyError));
      } finally {
        setBusy(false);
      }
    }

    function deptPillHtml(key) {
      return `<div class="dept-pill">${esc(deptLabel(normalizeDept(key)))}</div>`;
    }

    function resetChat() {
      localStorage.removeItem("alte_pro_v2_conversation_id");
      localStorage.removeItem("alte_pro_v2_session_id");
      conversationId = "";
      sessionId = "";
      els.messages.innerHTML = "";
      addBot(welcomeHtml());
    }

    function setLanguage(next) {
      lang = next === "en" ? "en" : "ka";
      renderStaticText();
      renderNav();
      renderQuick();
      resetChat();
    }

    els.ka.addEventListener("click", () => setLanguage("ka"));
    els.en.addEventListener("click", () => setLanguage("en"));
    els.reset.addEventListener("click", resetChat);
    els.composer.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage(els.input.value);
    });

    renderStaticText();
    renderNav();
    renderQuick();
    addBot(welcomeHtml());
  </script>
</body>
</html>
