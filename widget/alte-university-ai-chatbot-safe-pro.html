<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alte AI Assistant - Safe Pro Sidebar</title>
  <style>
    :root {
      --alte-teal: #074045;
      --alte-teal-2: #0a5960;
      --alte-teal-3: #16766f;
      --alte-cream: #f7f2e8;
      --alte-cream-2: #fffbf2;
      --alte-mint: #eef7f5;
      --alte-line: #e4ddd0;
      --alte-line-2: #d7e8e4;
      --alte-text: #102224;
      --alte-muted: #5d7072;
      --alte-warning: #b45309;
      color-scheme: light;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #efe9dc;
      color: var(--alte-text);
      font-family: Inter, "Noto Sans Georgian", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .alte-pro-demo-frame {
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 0%, rgba(22, 118, 111, .13), transparent 34%),
        linear-gradient(135deg, #f4efe5 0%, #edf6f4 100%);
    }

    .alte-pro-widget {
      width: min(1080px, calc(100vw - 36px));
      height: min(760px, calc(100vh - 48px));
      min-height: 640px;
      display: grid;
      grid-template-columns: 228px minmax(430px, 1fr);
      overflow: hidden;
      border: 1px solid rgba(7, 64, 69, .15);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 72px rgba(7, 64, 69, .16);
    }

    .alte-sidebar {
      min-width: 0;
      display: flex;
      flex-direction: column;
      background: var(--alte-cream);
      border-right: 1px solid var(--alte-line);
    }

    .brand {
      padding: 18px 16px 15px;
      display: flex;
      gap: 11px;
      align-items: center;
      border-bottom: 1px solid var(--alte-line);
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--alte-teal);
      color: #fff;
      font-weight: 900;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .brand-title strong {
      display: block;
      font-size: 14px;
      line-height: 1.15;
      letter-spacing: -.01em;
    }

    .brand-title span {
      display: block;
      margin-top: 3px;
      font-size: 10.5px;
      color: var(--alte-muted);
      line-height: 1.3;
    }

    .sidebar-scroll {
      flex: 1;
      overflow: auto;
      padding: 9px 8px 12px;
    }

    .sidebar-section {
      padding: 11px 8px 6px;
      color: #7c8d8e;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .dept-list {
      display: grid;
      gap: 5px;
    }

    .dept-btn {
      width: 100%;
      min-height: 43px;
      display: grid;
      grid-template-columns: 28px 1fr;
      align-items: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 7px 8px;
      background: transparent;
      color: #354749;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    .dept-btn:hover {
      background: rgba(7, 64, 69, .06);
      color: var(--alte-teal);
    }

    .dept-btn.active {
      background: var(--alte-teal);
      color: #fff;
      box-shadow: 0 10px 24px rgba(7, 64, 69, .17);
    }

    .dept-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 9px;
      background: #fff;
      color: var(--alte-teal);
      font-size: 11px;
      font-weight: 900;
    }

    .dept-btn.active .dept-icon {
      background: rgba(255, 255, 255, .16);
      color: #fff;
    }

    .dept-label strong {
      display: block;
      font-size: 12.5px;
      line-height: 1.15;
    }

    .dept-label span {
      display: block;
      margin-top: 2px;
      font-size: 10.5px;
      opacity: .74;
      line-height: 1.2;
    }

    .sidebar-foot {
      padding: 12px 14px;
      border-top: 1px solid var(--alte-line);
      display: flex;
      gap: 9px;
      align-items: center;
      color: var(--alte-muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .sidebar-foot .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #20a46b;
      box-shadow: 0 0 0 4px rgba(32, 164, 107, .13);
      flex: 0 0 auto;
    }

    .chat-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      background: linear-gradient(180deg, #fff 0%, #fbfdfc 100%);
    }

    .chat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--alte-line);
      background: #fff;
    }

    .assistant-title {
      display: flex;
      gap: 11px;
      align-items: center;
      min-width: 0;
    }

    .assistant-avatar {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--alte-teal);
      color: #fff;
      font-weight: 900;
      position: relative;
      flex: 0 0 auto;
    }

    .assistant-avatar::after {
      content: "";
      position: absolute;
      right: 1px;
      bottom: 1px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #20a46b;
      border: 2px solid #fff;
    }

    .assistant-title strong {
      display: block;
      font-size: 17px;
      line-height: 1.2;
    }

    .assistant-title span {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 3px;
      color: var(--alte-muted);
      font-size: 11.5px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .lang-switch {
      display: flex;
      height: 32px;
      overflow: hidden;
      border: 1px solid var(--alte-line);
      border-radius: 9px;
      background: #fff;
    }

    .lang-btn,
    .reset-btn {
      border: 0;
      background: #fff;
      color: var(--alte-teal);
      cursor: pointer;
      font: inherit;
      font-size: 11.5px;
      font-weight: 900;
    }

    .lang-btn {
      min-width: 38px;
      padding: 0 10px;
    }

    .lang-btn.active {
      background: var(--alte-teal);
      color: #fff;
    }

    .reset-btn {
      height: 32px;
      padding: 0 11px;
      border: 1px solid var(--alte-line);
      border-radius: 9px;
    }

    .reset-btn:hover,
    .lang-btn:hover {
      background: var(--alte-mint);
    }

    .lang-btn.active:hover {
      background: var(--alte-teal);
    }

    .trust-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 9px 18px;
      border-bottom: 1px solid var(--alte-line-2);
      background: var(--alte-mint);
      color: var(--alte-teal-3);
      font-size: 11.5px;
      line-height: 1.35;
    }

    .trust-bar strong {
      color: var(--alte-teal);
    }

    .department-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      padding: 5px 9px;
      border: 1px solid rgba(7, 64, 69, .16);
      border-radius: 999px;
      background: #fff;
      color: var(--alte-teal);
      font-size: 11px;
      font-weight: 900;
    }

    .messages {
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 11px;
      padding: 16px 18px;
    }

    .msg {
      max-width: 82%;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.bot,
    .msg.system {
      align-self: flex-start;
    }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: var(--alte-mint);
      color: var(--alte-teal);
      font-size: 11px;
      font-weight: 900;
    }

    .msg.user .avatar {
      background: #f0dfbd;
      color: #67502f;
    }

    .bubble {
      padding: 10px 12px;
      border-radius: 14px 14px 14px 5px;
      background: var(--alte-cream);
      border: 1px solid var(--alte-line);
      color: var(--alte-text);
      font-size: 13.5px;
      line-height: 1.52;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      color: #fff;
      background: var(--alte-teal);
      border-color: var(--alte-teal);
      border-radius: 14px 14px 5px 14px;
    }

    .msg.system .bubble {
      background: #fff;
      border-style: dashed;
      color: var(--alte-muted);
    }

    .source-list,
    .handover-card,
    .contact-card,
    .risk-note {
      margin-top: 9px;
      padding: 10px 11px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--alte-line);
      white-space: normal;
    }

    .source-list strong,
    .handover-card strong,
    .contact-card strong,
    .risk-note strong {
      display: block;
      margin-bottom: 5px;
      color: var(--alte-text);
      font-size: 12px;
    }

    .source-list a,
    .source-list div {
      display: block;
      margin-top: 5px;
      color: var(--alte-teal);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    .handover-card {
      border-color: #f0ce92;
      border-left: 4px solid #e67b16;
      background: #fff8e8;
    }

    .contact-card {
      border-color: #cfe5de;
      background: #f4fbf9;
    }

    .risk-note {
      border-color: #f0ce92;
      color: #79420a;
      background: #fff9ed;
    }

    .quick-zone {
      display: grid;
      gap: 7px;
      padding: 0 18px 13px;
      background: #fff;
    }

    .quick-title {
      color: var(--alte-muted);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .quick-btn {
      border: 1px solid var(--alte-line);
      border-radius: 999px;
      background: #fff;
      color: var(--alte-teal);
      cursor: pointer;
      padding: 7px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 900;
    }

    .quick-btn:hover {
      background: var(--alte-mint);
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 9px;
      padding: 12px;
      border-top: 1px solid var(--alte-line);
      background: #fff;
    }

    .composer input {
      min-width: 0;
      height: 44px;
      border: 1px solid var(--alte-line);
      border-radius: 12px;
      outline: none;
      padding: 0 13px;
      color: var(--alte-text);
      font: inherit;
      font-size: 13.5px;
    }

    .composer input:focus {
      border-color: var(--alte-teal);
      box-shadow: 0 0 0 3px rgba(7, 64, 69, .1);
    }

    .send-btn {
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: var(--alte-teal);
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: 900;
    }

    .send-btn:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    @media (max-width: 780px) {
      .alte-pro-demo-frame { padding: 12px; }
      .alte-pro-widget {
        width: 100%;
        height: auto;
        min-height: calc(100vh - 24px);
        grid-template-columns: 1fr;
      }
      .alte-sidebar {
        max-height: 248px;
        border-right: 0;
        border-bottom: 1px solid var(--alte-line);
      }
      .sidebar-scroll { max-height: 180px; }
      .chat-panel { min-height: 560px; }
      .msg { max-width: 92%; }
      .trust-bar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="alte-pro-demo-frame">
    <section class="alte-pro-widget" aria-label="Alte AI Assistant safe pro sidebar widget">
      <aside class="alte-sidebar sidebar" aria-label="Department sidebar">
        <div class="brand">
          <div class="brand-logo">A</div>
          <div class="brand-title">
            <strong>Alte Assistant</strong>
            <span>AI chat · department routing</span>
          </div>
        </div>
        <div class="sidebar-scroll">
          <div class="sidebar-section" data-i18n="mainSection">Main</div>
          <div class="dept-list" id="mainDepartments"></div>
          <div class="sidebar-section" data-i18n="otherSection">Other</div>
          <div class="dept-list" id="otherDepartments"></div>
        </div>
        <div class="sidebar-foot">
          <span class="dot" aria-hidden="true"></span>
          <span data-i18n="sidebarFoot">Backend connected. CRM actions are decided only by the backend.</span>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="assistant-title">
            <div class="assistant-avatar">AI</div>
            <div>
              <strong>Alte AI Assistant</strong>
              <span id="statusText">Online / Backend connected</span>
            </div>
          </div>
          <div class="header-actions">
            <div class="lang-switch" aria-label="Language">
              <button class="lang-btn" type="button" data-lang="ka">KA</button>
              <button class="lang-btn" type="button" data-lang="en">EN</button>
            </div>
            <button class="reset-btn" type="button" id="resetBtn" data-i18n="reset">Reset</button>
          </div>
        </header>

        <div class="trust-bar">
          <span data-i18n="trustText">Answers are based on official Alte sources. Sensitive facts are routed for confirmation.</span>
          <span class="department-badge" id="departmentBadge">Admissions</span>
        </div>

        <section class="messages" id="messages" aria-live="polite"></section>

        <section class="quick-zone" aria-label="Department quick chips">
          <div class="quick-title" data-i18n="quickTitle">Quick questions</div>
          <div class="quick-row" id="quickRow"></div>
        </section>

        <form class="composer" id="form">
          <input id="input" autocomplete="off" />
          <button class="send-btn" id="sendBtn" type="submit" aria-label="Send">↗</button>
        </form>
      </main>
    </section>
  </div>

  <script>
    window.AlteChatWidgetConfig = window.AlteChatWidgetConfig || {
      apiBaseUrl: "https://alte-ai-crm-backend-226875230147.europe-west1.run.app",
      sourceDomain: "alte.edu.ge",
      defaultLanguage: "ka"

    const cfg = window.AlteChatWidgetConfig;

    const departmentNames = {

    const departments = [

      { key: "admissions", topic: "admissions", group: "main", icon: "AD", ka: "მიღება", en: "Admissions", subKa: "ჩარიცხვა და პროცესი", subEn: "Enrollment process" },

    const quickChips = {

      ],
      medicine: [

      ],
      student_services: [

      it_support: [

      general: [

        { ka: "კონტაქტი", en: "Contact", topic: "contact" },
        { ka: "მიღება", en: "Admissions", topic: "admissions" }
      ]
    };

    const i18n = {
      ka: {
        mainSection: "მთავარი",
        otherSection: "სხვა",
        sidebarFoot: "Backend connected. CRM მოქმედებებს მხოლოდ backend წყვეტს.",

        greeting: "გამარჯობა. აირჩიეთ დეპარტამენტი მარცხნივ ან დაწერეთ კითხვა. თუ ზუსტ პასუხს Knowledge Base-დან ვერ დავადასტურებ, სწორ დეპარტამენტთან გადაგამისამართებთ.",
        selected: "არჩეული დეპარტამენტი",
        topicReady: "კარგი, ამ თემაზე დაგეხმარებით. შეგიძლიათ მომწეროთ კითხვა.",
        sourceTitle: "წყაროები",
        handoverTitle: "ოპერატორთან გადამისამართება",
        contactTitle: "საკონტაქტო ინფორმაცია",
        contactBody: "შეგიძლიათ დატოვოთ ტელეფონი ან ელფოსტა, თუ გსურთ კონსულტაცია.",
        handoverBody: (department) => `ამ საკითხზე დაგაკავშირებთ შესაბამის დეპარტამენტთან: ${department}. შეგიძლიათ დატოვოთ ტელეფონი ან ელფოსტა, რომ ოპერატორი დაგიკავშირდეთ.`,
        sensitiveNote: "ამ საკითხზე შეიძლება საჭირო იყოს ოფიციალური დადასტურება.",
        error: "კავშირი დროებით მიუწვდომელია. სცადეთ მოგვიანებით ან გამოიყენეთ ოფიციალური საკონტაქტო არხი.",
        operatorMessage: "მინდა ოპერატორთან საუბარი"
      },
      en: {
        mainSection: "Main",
        otherSection: "Other",
        sidebarFoot: "Backend connected. CRM actions are decided only by the backend.",
        reset: "Reset",
        trustText: "Answers are based on official Alte sources. Sensitive facts are routed for confirmation.",
        quickTitle: "Quick questions",
        placeholder: "Type your question...",
        statusOnline: "Online / Backend connected",
        statusConnecting: "Connecting to backend...",
        statusThinking: "Thinking...",
        statusUnavailable: "Backend unavailable",
        greeting: "Hello. Choose a department on the left or ask a question. If I cannot confirm the answer from the Knowledge Base, I will route you to the right department.",
        selected: "Selected department",
        topicReady: "Sure, I can help with this topic. Please write your question.",
        sourceTitle: "Sources",
        handoverTitle: "Human handover",
        contactTitle: "Contact details",
        contactBody: "You may leave your phone or email if you want consultation.",
        handoverBody: (department) => `I can connect you with the right department: ${department}. You may leave your phone or email so an operator can contact you.`,
        sensitiveNote: "This topic may need official confirmation.",
        error: "The connection is temporarily unavailable. Please try later or use an official contact channel.",
        operatorMessage: "I want to talk to an operator"
      }
    };

    const storage = {
      language: "alteSafeProSidebarLanguage",
      sessionId: "alteSafeProSidebarSessionId",
      conversationId: "alteSafeProSidebarConversationId",
      selectedDepartment: "alteSafeProSidebarDepartment",
      selectedTopic: "alteSafeProSidebarTopic"
    };

    const state = {
      apiBaseUrl: cfg.apiBaseUrl,
      sourceDomain: cfg.sourceDomain || "alte.edu.ge",
      language: localStorage.getItem(storage.language) || cfg.defaultLanguage || "ka",
      sessionId: localStorage.getItem(storage.sessionId),
      conversationId: localStorage.getItem(storage.conversationId),
      selectedDepartment: localStorage.getItem(storage.selectedDepartment) || "admissions",
      selectedTopic: localStorage.getItem(storage.selectedTopic) || "programs",
      busy: false
    };

    const mainDepartments = document.getElementById("mainDepartments");
    const otherDepartments = document.getElementById("otherDepartments");
    const messages = document.getElementById("messages");
    const quickRow = document.getElementById("quickRow");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const departmentBadge = document.getElementById("departmentBadge");
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value || state.busy) return;
      input.value = "";
      sendMessage(value);
    });

    resetBtn.addEventListener("click", resetChat);
    langButtons.forEach((button) => button.addEventListener("click", () => setLanguage(button.dataset.lang)));

    function setLanguage(language) {
      state.language = language;
      localStorage.setItem(storage.language, language);
      document.documentElement.lang = language;
      input.placeholder = i18n[language].placeholder;
      statusText.textContent = i18n[language].statusOnline;
      langButtons.forEach((button) => button.classList.toggle("active", button.dataset.lang === language));
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = i18n[language][node.dataset.i18n];
      });
      renderDepartments();
      renderQuickChips();
      updateDepartmentBadge();
      if (!messages.children.length) renderGreeting();
    }

    function renderDepartments() {
      mainDepartments.innerHTML = "";
      otherDepartments.innerHTML = "";
      departments.forEach((department) => {
        const selected = department.key === state.selectedDepartment && department.topic === state.selectedTopic;
        const button = document.createElement("button");
        button.type = "button";
        button.className = `dept-btn${selected ? " active" : ""}`;
        button.dataset.department = department.key;
        button.dataset.topic = department.topic;
        button.innerHTML = `
          <span class="dept-icon">${department.icon}</span>
          <span class="dept-label">
            <strong>${department[state.language]}</strong>
            <span>${state.language === "ka" ? department.subKa : department.subEn}</span>
          </span>
        `;
        button.addEventListener("click", () => handleDepartmentClick(department));
        (department.group === "main" ? mainDepartments : otherDepartments).appendChild(button);
      });
    }

    function handleDepartmentClick(department) {
      if (department.topic === "human_operator") {
        state.selectedTopic = "human_operator";
        localStorage.setItem(storage.selectedTopic, state.selectedTopic);
        renderDepartments();
        renderQuickChips();
        updateDepartmentBadge();
        sendMessage(i18n[state.language].operatorMessage, { forceHandover: true });
        return;
      }
      setDepartment(department.key, department.topic);
      addMessage("system", `${i18n[state.language].selected}: ${departmentName(department.key)}. ${i18n[state.language].topicReady}`);
    }

    function setDepartment(department, topic) {
      state.selectedDepartment = department;
      state.selectedTopic = topic;
      localStorage.setItem(storage.selectedDepartment, department);
      localStorage.setItem(storage.selectedTopic, topic);
      renderDepartments();
      renderQuickChips();
      updateDepartmentBadge();
    }

    function updateDepartmentBadge() {
      departmentBadge.textContent = `${i18n[state.language].selected}: ${departmentName(state.selectedDepartment)}`;
    }

    function departmentName(key) {
      const normalized = normalizeDepartmentKey(key);
      return (departmentNames[normalized] || departmentNames.general)[state.language];
    }

    function normalizeDepartmentKey(value) {
      const raw = String(value || "").toLowerCase();
      if (raw.includes("finance") || raw.includes("tuition") || raw.includes("საფას")) return "finance";
      if (raw.includes("international") || raw.includes("join") || raw.includes("საერთაშორისო")) return "international";
      if (raw.includes("medicine") || raw.includes("md") || raw.includes("მედიც")) return "medicine";
      if (raw.includes("student")) return "student_services";
      if (raw.includes("it") || raw.includes("technical")) return "it_support";
      if (raw.includes("admission") || raw.includes("მიღ")) return "admissions";
      if (departmentNames[raw]) return raw;
      return state.selectedDepartment || "general";
    }

    function renderQuickChips() {
      quickRow.innerHTML = "";
      const chips = quickChips[state.selectedDepartment] || quickChips.general;
      chips.forEach((chip) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "quick-btn";
        button.textContent = chip[state.language];
        button.dataset.topic = chip.topic;
        button.addEventListener("click", () => {
          state.selectedTopic = chip.topic;
          localStorage.setItem(storage.selectedTopic, chip.topic);
          renderDepartments();
          updateDepartmentBadge();
          sendMessage(chip[state.language]);
        });
        quickRow.appendChild(button);
      });
    }

    function renderGreeting() {
      addMessage("bot", i18n[state.language].greeting);
    }

    function resetChat() {
      localStorage.removeItem(storage.sessionId);
      localStorage.removeItem(storage.conversationId);
      state.sessionId = null;
      state.conversationId = null;
      messages.innerHTML = "";
      renderGreeting();
      ensureSession();
    }

    function addMessage(role, value, payload) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "U" : role === "system" ? "i" : "A";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = value;
      if (payload) renderPayloadExtras(bubble, payload);
      row.appendChild(avatar);
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderPayloadExtras(parent, payload) {
      const missing = Array.isArray(payload.missing_fields) ? payload.missing_fields : [];
      const confidence = typeof payload.confidence === "number" ? payload.confidence : null;
      const explicitDepartment = payload.department_key || payload.route_department || payload.department;
      const departmentKey = normalizeDepartmentKey(explicitDepartment);
      const safeDepartmentName = departmentName(departmentKey);
      const hasSourceMissing = payload.source_missing === true || payload.source_status === "missing";
      const shouldShowHandover = Boolean(
        payload.should_handover ||
        payload.needs_handover ||
        payload.route_department ||
        payload.department_key ||
        payload.forceHandover ||
        hasSourceMissing ||
        (confidence !== null && confidence < 0.70) ||
        missing.includes("phone_or_email") ||
        missing.includes("phone") ||
        missing.includes("email")
      );

      if (payload.risk_flags || payload.sensitive_topic || hasSourceMissing) {
        const note = document.createElement("div");
        note.className = "risk-note";
        note.innerHTML = `<strong>${i18n[state.language].sensitiveNote}</strong>`;
        parent.appendChild(note);
      }

      if (shouldShowHandover) {
        const card = document.createElement("div");
        card.className = "handover-card";
        card.innerHTML = `<strong>${i18n[state.language].handoverTitle}</strong>${i18n[state.language].handoverBody(safeDepartmentName)}`;
        parent.appendChild(card);
      }

      if (missing.includes("phone_or_email") || missing.includes("phone") || missing.includes("email")) {
        const card = document.createElement("div");
        card.className = "contact-card";
        card.innerHTML = `<strong>${i18n[state.language].contactTitle}</strong>${i18n[state.language].contactBody}`;
        parent.appendChild(card);
      }

      const sources = Array.isArray(payload.used_sources)
        ? payload.used_sources
        : Array.isArray(payload.sources)
          ? payload.sources
          : [];
      if (sources.length) {
        const box = document.createElement("div");
        box.className = "source-list";
        box.innerHTML = `<strong>${i18n[state.language].sourceTitle}</strong>`;
        sources.slice(0, 4).forEach((source) => {
          const url = source.source_url || source.url || source.link;
          const title = source.title || source.source_key || source.name || url || "Knowledge Base";
          const item = document.createElement(url ? "a" : "div");
          item.textContent = title;
          if (url) {
            item.href = url;
            item.target = "_blank";
            item.rel = "noreferrer";
          }
          box.appendChild(item);
        });
        parent.appendChild(box);
      }
    }

    async function ensureSession() {
      if (state.sessionId && state.conversationId) return;
      setBusy(true, i18n[state.language].statusConnecting);
      try {
        const response = await fetch(`${state.apiBaseUrl}/chat/session/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source_domain: state.sourceDomain,
            language: state.language,
            channel: "website",
            widget_variant: "safe_pro_sidebar"
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.sessionId = data.session_id || data.sessionId || state.sessionId;
        state.conversationId = data.conversation_id || data.conversationId || state.conversationId;
        if (state.sessionId) localStorage.setItem(storage.sessionId, state.sessionId);
        if (state.conversationId) localStorage.setItem(storage.conversationId, state.conversationId);
        setBusy(false, i18n[state.language].statusOnline);
      } catch (_) {
        setBusy(false, i18n[state.language].statusUnavailable);
        addMessage("bot", i18n[state.language].error);
      }
    }

    async function sendMessage(value, options = {}) {
      addMessage("user", value);
      await ensureSession();
      if (!state.sessionId && !state.conversationId) return;
      setBusy(true, i18n[state.language].statusThinking);
      try {
        const metadata = {
          selected_department: state.selectedDepartment,
          selected_topic: state.selectedTopic,
          page_url: window.location.href,
          widget_variant: "safe_pro_sidebar",
          human_request: Boolean(options.forceHandover)
        };
        const response = await fetch(`${state.apiBaseUrl}/chat/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: state.sessionId,
            conversation_id: state.conversationId,
            message: value,
            language: state.language,
            source_domain: state.sourceDomain,
            selected_department: state.selectedDepartment,
            selected_topic: state.selectedTopic,
            page_url: window.location.href,
            widget_variant: "safe_pro_sidebar",
            human_request: Boolean(options.forceHandover),
            metadata,
            metadata_json: metadata
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const reply = data.reply || data.answer || data.message || i18n[state.language].error;
        addMessage("bot", reply, data);
        setBusy(false, i18n[state.language].statusOnline);
      } catch (_) {
        setBusy(false, i18n[state.language].statusUnavailable);
        addMessage("bot", i18n[state.language].error);
      }
    }

    function setBusy(value, label) {
      state.busy = value;
      sendBtn.disabled = value;
      statusText.textContent = label;
    }

    setLanguage(state.language);
    ensureSession();
  </script>
</body>
</html>
