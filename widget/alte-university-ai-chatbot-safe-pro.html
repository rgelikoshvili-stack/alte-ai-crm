<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alte AI Chatbot - Safe Pro Sidebar</title>
  <style>
    :root {
      --alte-teal: #074045;
      --alte-teal-2: #0b5960;
      --alte-mint: #e8f4f2;
      --alte-cream: #fffaf0;
      --alte-line: #dce9e7;
      --alte-text: #142527;
      --alte-muted: #5e7472;
      --alte-soft: #f7fbfa;
      --alte-warn: #8a5a00;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #eef5f4;
      color: var(--alte-text);
      font-family: Inter, "Noto Sans Georgian", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .demo-shell {
      min-height: 100vh;
      padding: 28px;
      display: grid;
      place-items: center;
    }
    .alte-chat-app {
      width: min(1120px, calc(100vw - 36px));
      height: min(760px, calc(100vh - 56px));
      min-height: 620px;
      display: grid;
      grid-template-columns: 230px 1fr;
      border: 1px solid var(--alte-line);
      border-radius: 18px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 22px 70px rgba(7, 64, 69, .14);
    }
    .alte-sidebar {
      background: var(--alte-teal);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .brand {
      padding: 22px 18px 18px;
      border-bottom: 1px solid rgba(255,255,255,.16);
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--alte-teal);
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 12px;
    }
    .brand strong { display: block; font-size: 17px; line-height: 1.2; }
    .brand span { display: block; margin-top: 6px; color: rgba(255,255,255,.72); font-size: 12px; line-height: 1.4; }
    .sidebar-section {
      padding: 14px 12px 6px;
      color: rgba(255,255,255,.62);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .dept-list {
      display: grid;
      gap: 6px;
      padding: 0 10px;
    }
    .dept-btn {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,.86);
      border-radius: 12px;
      padding: 10px 10px;
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 8px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      align-items: center;
    }
    .dept-btn:hover { background: rgba(255,255,255,.08); }
    .dept-btn.active {
      background: #fff;
      color: var(--alte-teal);
      border-color: rgba(255,255,255,.4);
      box-shadow: 0 12px 30px rgba(0,0,0,.12);
    }
    .dept-icon {
      width: 26px;
      height: 26px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.12);
      font-size: 13px;
      font-weight: 900;
    }
    .dept-btn.active .dept-icon { background: var(--alte-mint); }
    .dept-label strong { display: block; font-size: 13px; line-height: 1.15; }
    .dept-label span { display: block; margin-top: 3px; font-size: 11px; opacity: .74; line-height: 1.25; }
    .sidebar-foot {
      margin-top: auto;
      padding: 14px;
      color: rgba(255,255,255,.68);
      font-size: 12px;
      line-height: 1.45;
      border-top: 1px solid rgba(255,255,255,.14);
    }
    .chat-main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: linear-gradient(180deg, #fff 0%, #f8fbfb 100%);
    }
    .chat-head {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--alte-line);
      background: #fff;
    }
    .chat-title strong { display: block; font-size: 20px; line-height: 1.2; }
    .chat-title span { display: block; margin-top: 5px; color: var(--alte-muted); font-size: 13px; }
    .head-actions { display: flex; align-items: center; gap: 8px; }
    .lang-btn, .reset-btn {
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--alte-line);
      background: #fff;
      color: var(--alte-teal);
      cursor: pointer;
      font-weight: 900;
      padding: 0 10px;
    }
    .lang-btn.active { background: var(--alte-teal); color: #fff; border-color: var(--alte-teal); }
    .context-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--alte-line);
      background: var(--alte-soft);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      border: 1px solid var(--alte-line);
      background: #fff;
      color: var(--alte-teal);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 900;
    }
    .trust {
      color: var(--alte-muted);
      font-size: 12px;
    }
    .messages {
      overflow: auto;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 78%;
      display: flex;
      gap: 9px;
      align-items: flex-end;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      background: var(--alte-teal);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      flex: 0 0 auto;
    }
    .bubble {
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.48;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .msg.bot .bubble {
      background: #eef6f5;
      border: 1px solid #dce9e7;
      border-bottom-left-radius: 5px;
    }
    .msg.user .bubble {
      background: var(--alte-teal);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 14px;
      background: #fff;
    }
    .quick-btn {
      border: 1px solid var(--alte-line);
      background: #fff;
      color: var(--alte-teal);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .composer {
      border-top: 1px solid var(--alte-line);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 10px;
      background: #fff;
    }
    .input {
      border: 1px solid var(--alte-line);
      border-radius: 12px;
      min-height: 44px;
      padding: 0 13px;
      font: inherit;
      outline: none;
    }
    .send {
      border: 0;
      border-radius: 12px;
      background: var(--alte-teal);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
    }
    .send:disabled { opacity: .55; cursor: wait; }
    .source-list, .handover-card, .contact-card {
      margin-top: 9px;
      border-radius: 13px;
      border: 1px solid #d8e8e5;
      background: #fff;
      padding: 10px;
      font-size: 12px;
      color: var(--alte-muted);
    }
    .handover-card { border-color: #efd58d; background: #fff9e8; }
    .source-list strong, .handover-card strong, .contact-card strong { display: block; color: var(--alte-text); margin-bottom: 5px; }
    .source-list a { display: block; color: var(--alte-teal); text-decoration: none; margin-top: 5px; overflow-wrap: anywhere; }
    @media (max-width: 760px) {
      .demo-shell { padding: 10px; }
      .alte-chat-app {
        width: 100%;
        min-height: 680px;
        height: calc(100vh - 20px);
        grid-template-columns: 1fr;
      }
      .alte-sidebar {
        max-height: 210px;
        overflow: auto;
      }
      .brand { display: none; }
      .dept-list { grid-template-columns: repeat(2, minmax(0, 1fr)); padding-bottom: 10px; }
      .sidebar-foot { display: none; }
      .msg { max-width: 92%; }
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <section class="alte-chat-app" aria-label="Alte AI Assistant sidebar chat">
      <aside class="alte-sidebar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <strong>Alte AI Assistant</strong>
          <span>Department-aware student support</span>
        </div>
        <div class="sidebar-section" data-i18n="mainSection">Main</div>
        <nav class="dept-list" id="mainDepartments"></nav>
        <div class="sidebar-section" data-i18n="otherSection">Other</div>
        <nav class="dept-list" id="otherDepartments"></nav>
        <div class="sidebar-foot">
          Browser -> FastAPI backend -> Claude / Knowledge Base / CRM rules.
        </div>
      </aside>

      <section class="chat-main">
        <header class="chat-head">
          <div class="chat-title">
            <strong>Alte AI Assistant</strong>
            <span id="statusText">Online / Backend connected</span>
          </div>
          <div class="head-actions">
            <button class="lang-btn active" data-lang="ka" type="button">KA</button>
            <button class="lang-btn" data-lang="en" type="button">EN</button>
            <button class="reset-btn" id="resetBtn" type="button">Reset</button>
          </div>
        </header>

        <div class="context-bar">
          <div class="badge" id="departmentBadge">Admissions</div>
          <div class="trust">No API keys in browser. CRM actions are backend-decided.</div>
        </div>

        <div class="messages" id="messages"></div>
        <div class="quick-row" id="quickRow"></div>
        <form class="composer" id="form">
          <input class="input" id="input" autocomplete="off" placeholder="დაწერეთ კითხვა..." />
          <button class="send" id="sendBtn" type="submit">-></button>
        </form>
      </section>
    </section>
  </main>

  <script>
    window.AlteChatWidgetConfig = window.AlteChatWidgetConfig || {
      apiBaseUrl: "https://alte-ai-crm-backend-226875230147.europe-west1.run.app",
      sourceDomain: "alte.edu.ge",
      defaultLanguage: "ka"
    };

    const cfg = window.AlteChatWidgetConfig;
    const departments = [
      { key: "admissions", group: "main", icon: "A", ka: "პროგრამები", en: "Programs", topic: "programs", promptKa: "მაინტერესებს პროგრამები", promptEn: "What programs are available?" },
      { key: "admissions", group: "main", icon: "IN", ka: "მიღება", en: "Admissions", topic: "admissions", promptKa: "მაინტერესებს მიღება", promptEn: "How can I apply?" },
      { key: "finance", group: "main", icon: "₾", ka: "საფასური", en: "Finance / Tuition", topic: "tuition", promptKa: "მაინტერესებს სწავლის საფასური", promptEn: "How much is tuition?" },
      { key: "international", group: "main", icon: "GL", ka: "საერთაშორისო", en: "International", topic: "international_admissions", promptKa: "რა საბუთებია საჭირო საერთაშორისო სტუდენტებისთვის?", promptEn: "What documents do international students need?" },
      { key: "medicine", group: "main", icon: "MD", ka: "მედიცინა / MD", en: "Medicine / MD", topic: "medicine_md", promptKa: "მაინტერესებს MD პროგრამა", promptEn: "I want to apply for medicine from India" },
      { key: "student_services", group: "other", icon: "SS", ka: "სტუდ. სერვისები", en: "Student Services", topic: "student_services", promptKa: "მაინტერესებს სტუდენტური სერვისები", promptEn: "I have a student services question" },
      { key: "it_support", group: "other", icon: "IT", ka: "IT დახმარება", en: "IT Support", topic: "technical_support", promptKa: "პორტალზე შესვლის ტექნიკური პრობლემა მაქვს", promptEn: "I have a portal login problem" },
      { key: "admissions", group: "other", icon: "C", ka: "კონტაქტი", en: "Contact", topic: "contact", promptKa: "როგორ დავუკავშირდე უნივერსიტეტს?", promptEn: "How can I contact admissions?" },
      { key: "general", group: "other", icon: "OP", ka: "ოპერატორი", en: "Human Operator", topic: "human_request", promptKa: "მინდა ადამიანთან საუბარი", promptEn: "I want to speak with a human" }
    ];

    const text = {
      ka: {
        mainSection: "მთავარი",
        otherSection: "სხვა",
        placeholder: "დაწერეთ კითხვა...",
        greeting: "გამარჯობა. აირჩიეთ დეპარტამენტი მარცხნივ ან დაწერეთ კითხვა. თუ ზუსტ პასუხს ვერ დავადასტურებ Knowledge Base-იდან, სწორ დეპარტამენტთან გადაგამისამართებთ.",
        sourceTitle: "წყაროები",
        handoverTitle: "ოპერატორთან გადამისამართება",
        contactTitle: "საკონტაქტო ინფორმაცია",
        contactBody: "შეგიძლიათ დატოვოთ ტელეფონი ან ელფოსტა, თუ კონსულტაცია გსურთ.",
        error: "კავშირი დროებით მიუწვდომელია. სცადეთ მოგვიანებით ან გამოიყენეთ ოფიციალური საკონტაქტო არხი.",
        online: "Online / Backend connected"
      },
      en: {
        mainSection: "Main",
        otherSection: "Other",
        placeholder: "Type your question...",
        greeting: "Hello. Choose a department on the left or ask a question. If I cannot confirm the answer from the Knowledge Base, I will route you to the right department.",
        sourceTitle: "Sources",
        handoverTitle: "Human handover",
        contactTitle: "Contact details",
        contactBody: "You may leave your phone or email if you want consultation.",
        error: "The connection is temporarily unavailable. Please try later or use an official contact channel.",
        online: "Online / Backend connected"
      }
    };

    const state = {
      apiBaseUrl: cfg.apiBaseUrl,
      sourceDomain: cfg.sourceDomain || "alte.edu.ge",
      language: localStorage.getItem("alteSafeProSidebarLanguage") || cfg.defaultLanguage || "ka",
      sessionId: localStorage.getItem("alteSafeProSidebarSessionId"),
      conversationId: localStorage.getItem("alteSafeProSidebarConversationId"),
      selectedDepartment: localStorage.getItem("alteSafeProSidebarDepartment") || "admissions",
      selectedTopic: localStorage.getItem("alteSafeProSidebarTopic") || "programs",
      busy: false
    };

    const mainDepartments = document.getElementById("mainDepartments");
    const otherDepartments = document.getElementById("otherDepartments");
    const messages = document.getElementById("messages");
    const quickRow = document.getElementById("quickRow");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const departmentBadge = document.getElementById("departmentBadge");
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const value = input.value.trim();
      if (!value || state.busy) return;
      input.value = "";
      sendMessage(value);
    });
    resetBtn.addEventListener("click", resetChat);
    langButtons.forEach((button) => button.addEventListener("click", () => setLanguage(button.dataset.lang)));

    function setLanguage(language) {
      state.language = language;
      localStorage.setItem("alteSafeProSidebarLanguage", language);
      input.placeholder = text[language].placeholder;
      statusText.textContent = text[language].online;
      langButtons.forEach((button) => button.classList.toggle("active", button.dataset.lang === language));
      document.querySelectorAll("[data-i18n]").forEach((node) => {
        node.textContent = text[language][node.dataset.i18n];
      });
      renderDepartments();
      renderQuickActions();
      updateContext();
      if (!messages.children.length) renderGreeting();
    }

    function renderDepartments() {
      mainDepartments.innerHTML = "";
      otherDepartments.innerHTML = "";
      departments.forEach((department) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `dept-btn${department.key === state.selectedDepartment && department.topic === state.selectedTopic ? " active" : ""}`;
        button.dataset.department = department.key;
        button.dataset.topic = department.topic;
        button.innerHTML = `
          <span class="dept-icon">${department.icon}</span>
          <span class="dept-label"><strong>${department[state.language]}</strong><span>${department.topic.replaceAll("_", " ")}</span></span>
        `;
        button.addEventListener("click", () => {
          setDepartment(department.key, department.topic);
          renderQuickActions();
        });
        (department.group === "main" ? mainDepartments : otherDepartments).appendChild(button);
      });
    }

    function setDepartment(department, topic) {
      state.selectedDepartment = department;
      state.selectedTopic = topic;
      localStorage.setItem("alteSafeProSidebarDepartment", department);
      localStorage.setItem("alteSafeProSidebarTopic", topic);
      renderDepartments();
      updateContext();
    }

    function updateContext() {
      const item = departments.find((entry) => entry.key === state.selectedDepartment && entry.topic === state.selectedTopic)
        || departments.find((entry) => entry.key === state.selectedDepartment);
      departmentBadge.textContent = item ? item[state.language] : state.selectedDepartment.replaceAll("_", " ");
    }

    function renderQuickActions() {
      quickRow.innerHTML = "";
      departments
        .filter((department) => department.key === state.selectedDepartment)
        .slice(0, 3)
        .forEach((department) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "quick-btn";
          button.textContent = department[state.language];
          button.addEventListener("click", () => {
            setDepartment(department.key, department.topic);
            sendMessage(state.language === "ka" ? department.promptKa : department.promptEn);
          });
          quickRow.appendChild(button);
        });
    }

    function renderGreeting() {
      addMessage("bot", text[state.language].greeting);
    }

    function resetChat() {
      localStorage.removeItem("alteSafeProSidebarSessionId");
      localStorage.removeItem("alteSafeProSidebarConversationId");
      state.sessionId = null;
      state.conversationId = null;
      messages.innerHTML = "";
      renderGreeting();
      ensureSession();
    }

    function addMessage(role, value, payload) {
      const row = document.createElement("div");
      row.className = `msg ${role}`;
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "U" : "A";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = value;
      if (payload) renderPayloadExtras(bubble, payload);
      row.appendChild(avatar);
      row.appendChild(bubble);
      messages.appendChild(row);
      messages.scrollTop = messages.scrollHeight;
    }

    function renderPayloadExtras(parent, payload) {
      const missing = payload.missing_fields || [];
      const department = payload.route_department || payload.department || departmentBadge.textContent;
      if (payload.should_handover || payload.needs_handover || payload.route_department || payload.department_key) {
        const card = document.createElement("div");
        card.className = "handover-card";
        card.innerHTML = `
          <strong>${text[state.language].handoverTitle}</strong>
          ${state.language === "ka"
            ? `ამ საკითხზე დაგაკავშირებთ შესაბამის დეპარტამენტთან: ${department}. შეგიძლიათ დატოვოთ ტელეფონი ან ელფოსტა.`
            : `I can connect you with the right department: ${department}. You may leave your phone or email.`}
        `;
        parent.appendChild(card);
      }
      if (missing.includes("phone_or_email") || missing.includes("phone") || missing.includes("email")) {
        const card = document.createElement("div");
        card.className = "contact-card";
        card.innerHTML = `<strong>${text[state.language].contactTitle}</strong>${text[state.language].contactBody}`;
        parent.appendChild(card);
      }
      const sources = payload.used_sources || payload.sources || [];
      if (sources.length) {
        const box = document.createElement("div");
        box.className = "source-list";
        box.innerHTML = `<strong>${text[state.language].sourceTitle}</strong>`;
        sources.slice(0, 3).forEach((source) => {
          const url = source.source_url || source.url;
          const title = source.title || source.source_key || url || "Knowledge Base";
          const item = document.createElement(url ? "a" : "div");
          item.textContent = title;
          if (url) {
            item.href = url;
            item.target = "_blank";
            item.rel = "noreferrer";
          }
          box.appendChild(item);
        });
        parent.appendChild(box);
      }
    }

    async function ensureSession() {
      if (state.sessionId && state.conversationId) return;
      setBusy(true, "Connecting...");
      try {
        const response = await fetch(`${state.apiBaseUrl}/chat/session/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            channel: "website_chat",
            source_domain: state.sourceDomain,
            language: state.language
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.sessionId = data.session_id;
        state.conversationId = data.conversation_id;
        localStorage.setItem("alteSafeProSidebarSessionId", state.sessionId);
        localStorage.setItem("alteSafeProSidebarConversationId", state.conversationId);
        setBusy(false, text[state.language].online);
      } catch (_) {
        setBusy(false, "Backend unavailable");
        addMessage("bot", text[state.language].error);
      }
    }

    async function sendMessage(value) {
      addMessage("user", value);
      await ensureSession();
      if (!state.sessionId || !state.conversationId) return;
      setBusy(true, "Thinking...");
      try {
        const response = await fetch(`${state.apiBaseUrl}/chat/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            conversation_id: state.conversationId,
            session_id: state.sessionId,
            message: value,
            language: state.language,
            source_domain: state.sourceDomain,
            selected_department: state.selectedDepartment,
            selected_topic: state.selectedTopic,
            page_url: window.location.href,
            widget_variant: "safe_pro_sidebar"
          })
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        addMessage("bot", data.reply || data.message || text[state.language].error, data);
        setBusy(false, text[state.language].online);
      } catch (_) {
        setBusy(false, "Backend unavailable");
        addMessage("bot", text[state.language].error);
      }
    }

    function setBusy(value, label) {
      state.busy = value;
      sendBtn.disabled = value;
      statusText.textContent = label;
    }

    setLanguage(state.language);
    ensureSession();
  </script>
</body>
</html>
