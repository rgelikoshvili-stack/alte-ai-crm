[build]
  publish = "test_site"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/variants/*.jsx"
  [headers.values]
    Content-Type = "text/plain; charset=UTF-8"
